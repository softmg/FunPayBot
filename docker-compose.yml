services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-funpaybot}
      POSTGRES_USER: ${POSTGRES_USER:-funpaybot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-funpaybot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/db/migrations:/docker-entrypoint-initdb.d:ro
    # Bound to localhost only: the database is reached over the compose network
    # by the services and must not be exposed on all host interfaces.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-funpaybot} -d ${POSTGRES_DB:-funpaybot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  funpay-api:
    build:
      context: ./services/funpay-api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://funpaybot:funpaybot@db:5432/funpaybot}
    depends_on:
      db:
        condition: service_healthy
    # Internal service; reachable by web/telegram-bot over the compose network.
    # Bound to localhost only so it is not exposed on all host interfaces.
    ports:
      - "127.0.0.1:8000:8000"

  telegram-bot:
    build:
      context: ./services/telegram-bot
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://funpaybot:funpaybot@db:5432/funpaybot}
      FUNPAY_API_URL: http://funpay-api:8000
    depends_on:
      db:
        condition: service_healthy
      funpay-api:
        condition: service_started

  web:
    build:
      context: ./apps/web
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://funpaybot:funpaybot@db:5432/funpaybot}
      FUNPAY_API_URL: http://funpay-api:8000
    depends_on:
      db:
        condition: service_healthy
      funpay-api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres-data:
